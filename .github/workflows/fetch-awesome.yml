name: Fetch Awesome README

on:
  schedule:
    # 每周一 UTC 00:00 执行（北京时间周一 08:00）
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Create GitHub token config
        run: |
          if [ -n "${{ secrets.GH_TOKEN }}" ]; then
            echo '{"token": "${{ secrets.GH_TOKEN }}"}' > github_token.json
            echo "Token config created"
          else
            echo "No GH_TOKEN secret found, running without token"
          fi

      - name: Run fetch script
        run: python fetch_awesome.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'harry.sun'
          git config --global user.email 'sunguangjun@126.com'
          git add -A

          # 没有变更则直接退出
          if git diff --quiet && git diff --staged --quiet; then
            echo "没有变更，跳过提交"
            exit 0
          fi

          git commit -m "Auto update awesome README"

          # 拉取远程最新代码并合并，冲突时优先使用本地版本（脚本生成的最新内容）
          git fetch origin master
          if git merge origin/master -X ours --no-edit; then
            echo "合并成功"
          else
            echo "存在合并冲突，自动采用本地版本解决..."
            git diff --name-only --diff-filter=U | xargs git checkout --ours
            git add -A
            git commit --no-edit
          fi

          git push
